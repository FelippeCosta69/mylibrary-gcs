<div class="card">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
    <h2>Livros</h2><a routerLink="/livros/novo" class="btn btn-primary">+ Novo Livro</a>
  </div>
  <div style="display:flex;gap:1rem;margin-bottom:1rem">
    <input [(ngModel)]="termoBusca" placeholder="Buscar..." (input)="buscar()" style="margin-bottom:0">
    <select [(ngModel)]="statusFiltro" (change)="filtrarStatus()" style="margin-bottom:0;width:200px">
      <option value="">Todos</option>
      <option value="DISPONIVEL">Disponivel</option>
      <option value="EMPRESTADO">Emprestado</option>
    </select>
  </div>
  <div *ngIf="mensagem" style="color:red;margin-bottom:1rem">{{mensagem}}</div>
  <table>
    <thead><tr><th>Titulo</th><th>Autor</th><th>Categoria</th><th>Ano</th><th>Status</th><th>Acoes</th></tr></thead>
    <tbody>
      <tr *ngFor="let livro of livros">
        <td>{{livro.titulo}}</td>
        <td>{{livro.autor}}</td>
        <td>{{livro.categoria?.nome}}</td>
        <td>{{livro.ano}}</td>
        <td><span class="badge" [class.badge-success]="livro.status === 'DISPONIVEL'" [class.badge-warning]="livro.status === 'EMPRESTADO'">{{livro.status}}</span></td>
        <td><button class="btn btn-danger" (click)="deletar(livro.id)" [disabled]="livro.status === 'EMPRESTADO'">Excluir</button></td>
      </tr>
      <tr *ngIf="livros.length === 0"><td colspan="6" style="text-align:center;color:#999">Nenhum livro cadastrado</td></tr>
    </tbody>
  </table>
</div>
