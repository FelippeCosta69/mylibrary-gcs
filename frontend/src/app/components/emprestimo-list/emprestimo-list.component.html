<div class="card">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
    <h2>Emprķstimos</h2><a routerLink="/emprestimos/novo" class="btn btn-primary">+ Novo Emprķstimo</a>
  </div>
  <div *ngIf="mensagem" style="color:red;margin-bottom:1rem">{{mensagem}}</div>
  <table><thead><tr><th>Livro</th><th>Pessoa</th><th>Telefone</th><th>Emprķstimo</th><th>Prev. DevoluńŃo</th><th>Devolvido</th><th>Ań§es</th></tr></thead>
  <tbody>
    <tr *ngFor="let emp of emprestimos">
      <td>{{emp.livro?.titulo}}</td><td>{{emp.nomePessoa}}</td><td>{{emp.telefone}}</td><td>{{emp.dataEmprestimo}}</td><td>{{emp.dataDevolucaoPrevista}}</td>
      <td><span *ngIf="emp.dataDevolucaoEfetiva">{{emp.dataDevolucaoEfetiva}}</span><span *ngIf="!emp.dataDevolucaoEfetiva" class="badge badge-warning">Pendente</span></td>
      <td><button class="btn btn-success" (click)="devolver(emp.id)" *ngIf="!emp.dataDevolucaoEfetiva">Devolver</button><span *ngIf="emp.dataDevolucaoEfetiva" class="badge badge-success">Devolvido</span></td>
    </tr>
    <tr *ngIf="emprestimos.length === 0"><td colspan="7" style="text-align:center;color:#999">Nenhum emprķstimo registrado</td></tr>
  </tbody></table>
</div>
